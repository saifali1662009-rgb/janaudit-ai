services:
  - type: web
    name: janaudit-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: MESH_API_KEY
        sync: false
      - key: MESH_EMBEDDING_MODEL
        value: vertex/text-embedding-005
      - key: FRONTEND_ORIGIN
        sync: false
